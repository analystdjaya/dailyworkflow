<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3-PC Workflow Infographic Builder</title>
  <meta name="description" content="Build, share, and export a 3-PC daily workflow infographic with triggers, handoffs, dependencies, and status checkpoints.">
  <meta name="theme-color" content="#0b6b45">
  <meta property="og:title" content="3-PC Workflow Infographic Builder">
  <meta property="og:description" content="Build, share, and export a clean 3-PC daily workflow infographic.">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://analystdjaya.github.io/dailyworkflow/">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230b6b45'/%3E%3Cpath d='M18 20h12v8H18zm16 0h12v8H34zM18 36h12v8H18zm16 0h12v8H34z' fill='white'/%3E%3Cpath d='M30 24h4M24 28v8m16-8v8m-10 4h4' stroke='white' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <style>
:root {
      --ink: #17221f;
      --muted: #5c6f67;
      --line: #cfe4d7;
      --green-950: #053f2d;
      --green-900: #075338;
      --green-800: #0b6b45;
      --green-700: #10804f;
      --teal-700: #0f766e;
      --blue-800: #155e75;
      --orange-600: #e66a22;
      --paper: #ffffff;
      --soft: #f3faf5;
      --soft-2: #eef8f2;
    }

    * { box-sizing: border-box; }

    html {
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      max-width: 100%;
      overflow-x: hidden;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(243, 250, 245, 0.9), rgba(255, 255, 255, 0.96)),
        #f7fbf8;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid #cfded6;
      background: #fff;
      color: var(--ink);
      border-radius: 10px;
      padding: 10px 11px;
      font-size: 14px;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    textarea { min-height: 76px; resize: vertical; }

    input:focus, textarea:focus, select:focus {
      border-color: var(--green-700);
      box-shadow: 0 0 0 3px rgba(16, 128, 79, .14);
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(16, 128, 79, .28);
      outline-offset: 2px;
    }

    label {
      display: block;
      color: #264238;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .02em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .app-shell {
      display: grid;
      grid-template-columns: minmax(340px, 440px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
      min-width: 0;
    }

    .panel {
      min-width: 0;
      background: rgba(255, 255, 255, .94);
      border: 1px solid #d6e6dc;
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(7, 83, 56, .08);
    }

    .toolbar-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      border-radius: 11px;
      border: 1px solid transparent;
      padding: 9px 13px;
      font-weight: 800;
      font-size: 13px;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
      white-space: nowrap;
    }

    .toolbar-btn:hover { transform: translateY(-1px); }
    .toolbar-btn[aria-busy="true"] { opacity: .72; cursor: progress; transform: none; }
    .toolbar-btn:disabled {
      cursor: not-allowed;
      opacity: .45;
      transform: none;
    }

    .btn-primary { background: var(--green-800); color: #fff; box-shadow: 0 10px 22px rgba(7, 83, 56, .18); }
    .btn-secondary { background: #edf7f1; color: var(--green-900); border-color: #cfe4d7; }
    .btn-danger { background: #fff4ed; color: #b94711; border-color: #f5d1bd; }
    .btn-dark { background: #17221f; color: #fff; }

    .tab {
      flex: 1;
      min-width: 0;
      border: 1px solid #cfe4d7;
      background: #f6fbf7;
      color: #315346;
      border-radius: 12px;
      padding: 10px 8px;
      font-size: 13px;
      font-weight: 900;
      text-align: center;
    }

    .tab:focus-visible {
      outline-color: rgba(11, 107, 69, .35);
    }

    .tab.active {
      background: var(--green-800);
      color: #fff;
      border-color: var(--green-800);
      box-shadow: 0 10px 22px rgba(7, 83, 56, .16);
    }

    .zoom-btn {
      border-radius: 999px;
      padding: 4px 8px;
      color: var(--green-900);
      line-height: 1;
    }

    .zoom-btn.active {
      background: var(--green-800);
      color: #fff;
    }

    .step-editor {
      border: 1px solid #d6e6dc;
      border-radius: 15px;
      background: #fbfefc;
      padding: 14px;
    }

    .error-editor {
      border: 1px solid #f1c9b8;
      border-radius: 15px;
      background: #fffaf7;
      padding: 14px;
    }

    .preview-wrap {
      width: 100%;
      max-width: 100%;
      overflow: auto;
      overscroll-behavior: contain;
      border-radius: 16px;
      background: #eef8f2;
      border: 1px solid #d6e6dc;
      padding: 14px;
      max-height: calc(100vh - 122px);
    }

    .preview-stage {
      width: calc(1480px * var(--preview-scale, .75));
      height: auto;
    }

    .infographic {
      width: 1480px;
      background: var(--paper);
      border: 1px solid #c7dfcf;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 18px 55px rgba(7, 83, 56, .10);
    }

    .preview-stage .infographic {
      transform: scale(var(--preview-scale, .75));
      transform-origin: top left;
    }

    .info-header {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(330px, .55fr);
      gap: 28px;
      padding: 32px 38px 24px;
      background:
        linear-gradient(90deg, rgba(7, 83, 56, .96), rgba(12, 111, 77, .92)),
        var(--green-900);
      color: #fff;
    }

    .brand-icon {
      width: 82px;
      height: 82px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, .14);
      border: 1px solid rgba(255, 255, 255, .24);
    }

    .headline {
      font-size: 52px;
      line-height: .96;
      font-weight: 950;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .subline {
      margin-top: 12px;
      color: rgba(255, 255, 255, .88);
      font-size: 18px;
      max-width: 900px;
    }

    .status-box {
      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255, 255, 255, .22);
      border-radius: 18px;
      padding: 20px;
      align-self: center;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 38px 16px;
      color: var(--green-900);
      font-weight: 950;
      text-transform: uppercase;
      font-size: 22px;
      letter-spacing: .01em;
    }

    .section-title:before,
    .section-title:after {
      content: "";
      height: 2px;
      background: #a7d0b5;
      flex: 1;
    }

    .lanes {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      padding: 0 28px 24px;
    }

    .lane {
      background: linear-gradient(180deg, var(--soft), #fff);
      border: 1px solid #d7e8dd;
      border-radius: 17px;
      padding: 16px;
      min-width: 0;
    }

    .lane-head {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      padding-bottom: 14px;
      border-bottom: 2px solid #d5e8dc;
    }

    .lane-icon {
      width: 58px;
      height: 58px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #fff;
    }

    .lane-name {
      font-size: 22px;
      font-weight: 950;
      line-height: 1.05;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .flow-stack {
      padding-top: 16px;
    }

    .flow-node {
      position: relative;
      border: 1px solid #d5e5dc;
      border-left: 7px solid var(--lane-color);
      border-radius: 14px;
      background: #fff;
      padding: 13px 13px 12px;
      box-shadow: 0 10px 22px rgba(7, 83, 56, .06);
    }

    .node-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .step-badge {
      width: 34px;
      height: 34px;
      flex: 0 0 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--lane-color);
      color: #fff;
      font-weight: 950;
      font-size: 13px;
    }

    .node-title {
      font-size: 16px;
      line-height: 1.15;
      font-weight: 950;
      color: #142820;
      overflow-wrap: anywhere;
    }

    .node-action {
      margin-top: 8px;
      font-size: 15px;
      line-height: 1.35;
      font-weight: 800;
      color: #1f352d;
      overflow-wrap: anywhere;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      max-width: 100%;
      border-radius: 999px;
      padding: 5px 8px;
      background: #eff8f2;
      color: #164a33;
      border: 1px solid #cce4d5;
      font-size: 11px;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .result-box {
      margin-top: 10px;
      border-radius: 10px;
      background: #f1faf4;
      border: 1px solid #cfe4d7;
      color: #17392c;
      padding: 9px 10px;
      font-size: 13px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .note-text {
      margin-top: 8px;
      color: #607268;
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .flow-arrow {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      margin: 9px 0;
      color: var(--lane-color);
      font-weight: 900;
      font-size: 12px;
      text-align: center;
    }

    .flow-arrow:before,
    .flow-arrow:after {
      content: "";
      border-top: 2px dashed #9dccad;
    }

    .arrow-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 260px;
      border: 1px solid #cfe4d7;
      background: #fff;
      border-radius: 999px;
      padding: 5px 8px;
      overflow-wrap: anywhere;
    }

    .bottom-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(360px, .65fr);
      gap: 18px;
      align-items: start;
      padding: 0 28px 28px;
    }

    .doc-box {
      background: linear-gradient(180deg, #fbfefc, #f8fcf9);
      border: 1px solid #cfe4d7;
      border-radius: 16px;
      overflow: hidden;
    }

    .doc-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      padding: 12px 18px;
      border-bottom: 1px solid #dcece1;
      color: var(--green-900);
      font-size: 18px;
      font-weight: 950;
      text-transform: uppercase;
    }

    .handoff-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 13px;
    }

    .handoff-table th,
    .handoff-table td {
      border-bottom: 1px solid #e3efe7;
      padding: 10px 12px;
      vertical-align: top;
      text-align: left;
      overflow-wrap: anywhere;
    }

    .handoff-table th {
      color: #315346;
      background: #f0f8f3;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .02em;
    }

    .trigger-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px;
      background: #f4fbf7;
      border-bottom: 1px solid #dcece1;
    }

    .trigger-summary-item {
      border: 1px solid #d6e6dc;
      border-radius: 10px;
      background: #fff;
      padding: 10px 12px;
      min-width: 0;
    }

    .trigger-summary-label {
      color: #5c6f67;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .trigger-summary-value {
      margin-top: 4px;
      color: #17221f;
      font-size: 13px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .error-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 12px;
    }

    .error-card {
      border: 1px solid #f1d1c3;
      border-left: 6px solid #e66a22;
      border-radius: 14px;
      background: #fff;
      padding: 12px;
      box-shadow: 0 10px 24px rgba(185, 71, 17, .08);
      min-width: 0;
    }

    .error-card.solved {
      border-color: #cfe4d7;
      border-left-color: #10804f;
      box-shadow: 0 10px 24px rgba(16, 128, 79, .07);
    }

    .error-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .error-pc {
      color: #0b6b45;
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
    }

    .error-step {
      margin-top: 2px;
      color: #17221f;
      font-size: 17px;
      font-weight: 950;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .error-status {
      border-radius: 999px;
      padding: 5px 8px;
      background: #fff4ed;
      color: #b94711;
      font-size: 10px;
      font-weight: 950;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .error-card.solved .error-status {
      background: #edf7f1;
      color: #0b6b45;
    }

    .error-meta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      border-radius: 999px;
      background: #f6fbf7;
      border: 1px solid #d6e6dc;
      padding: 5px 8px;
      color: #315346;
      font-size: 11px;
      font-weight: 900;
    }

    .error-text {
      color: #40584e;
      font-size: 12px;
      font-weight: 750;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0;
    }

    .metric {
      min-height: 106px;
      padding: 16px;
      border-right: 1px solid #e0ece5;
      border-bottom: 1px solid #e0ece5;
    }

    .metric:nth-child(2n) { border-right: 0; }
    .metric:nth-last-child(-n + 2) { border-bottom: 0; }

    .metric-icon {
      color: var(--green-800);
      margin-bottom: 8px;
    }

    .metric-title {
      font-weight: 950;
      font-size: 14px;
      color: #1f352d;
    }

    .metric-text {
      color: #5f7068;
      margin-top: 4px;
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .info-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      background: linear-gradient(90deg, var(--green-950), var(--green-800));
      color: #fff;
      padding: 16px 36px;
      font-weight: 950;
      text-transform: uppercase;
    }

    .empty-state {
      border: 1px dashed #bdd7c7;
      background: #f8fcf9;
      border-radius: 14px;
      padding: 18px;
      color: #61756b;
      font-weight: 800;
      text-align: center;
    }

    .app-ready .preview-stage { transition: height .18s ease; }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 50;
      background: #17221f;
      color: #fff;
      padding: 12px 14px;
      border-radius: 12px;
      box-shadow: 0 14px 35px rgba(0, 0, 0, .22);
      font-size: 13px;
      font-weight: 800;
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .is-exporting {
      box-shadow: none;
      border-radius: 0;
    }

    .export-host {
      position: fixed;
      left: -10000px;
      top: 0;
      z-index: -1;
      width: 1480px;
      background: #fff;
      pointer-events: none;
    }

    @media (max-width: 1180px) {
      .app-shell { grid-template-columns: 1fr; }
      .preview-wrap { max-height: none; }
    }

    @media (max-width: 640px) {
      main { padding-left: 10px !important; padding-right: 10px !important; }
      .app-shell { display: block; }
      .panel { border-radius: 14px; }
      .toolbar-btn { width: 100%; }
      .step-actions .toolbar-btn {
        width: 40px;
        min-width: 40px;
        flex: 0 0 40px;
      }
      #pcTabs {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .tab { width: 100%; }
      .preview-wrap {
        padding: 10px;
        max-width: calc(100vw - 42px);
      }
      .trigger-summary { grid-template-columns: 1fr; }
    }
  </style>

<body>
  <main class="min-h-screen p-3 sm:p-5 lg:p-6">
    <div class="app-shell">
      <aside class="panel p-4 sm:p-5" aria-label="Workflow editor">
        <div class="flex items-start justify-between gap-3 border-b border-[#dcece1] pb-4">
          <div>
            <p class="text-xs font-black uppercase tracking-wide text-[#0b6b45]">Workflow Builder</p>
            <h1 class="mt-1 text-2xl font-black leading-tight text-[#17221f]">3-PC Infographic</h1>
          </div>
          <div class="grid h-12 w-12 place-items-center rounded-2xl bg-[#0b6b45] text-white" aria-hidden="true">
            <i data-lucide="network" class="h-7 w-7"></i>
          </div>
        </div>

        <div class="mt-4 grid grid-cols-1 gap-3 sm:grid-cols-2">
          <div class="sm:col-span-2">
            <label for="docTitle">Infographic Title</label>
            <input id="docTitle" data-doc-field="title" autocomplete="off">
          </div>
          <div>
            <label for="docDate">Date / Version</label>
            <input id="docDate" data-doc-field="dateLabel" autocomplete="off">
          </div>
          <div>
            <label for="docOwner">Owner / Team</label>
            <input id="docOwner" data-doc-field="owner" autocomplete="organization">
          </div>
          <div class="sm:col-span-2">
            <label for="docObjective">Objective</label>
            <textarea id="docObjective" data-doc-field="objective"></textarea>
          </div>
        </div>

        <div class="mt-5 flex gap-2" id="pcTabs" role="tablist" aria-label="PC lanes"></div>
        <div class="mt-4 border-t border-[#dcece1] pt-4" id="pcForm"></div>

        <div class="mt-5 grid gap-2 sm:grid-cols-2">
          <button class="toolbar-btn btn-primary" id="previewBtn" type="button"><i data-lucide="eye" class="h-4 w-4"></i>Preview</button>
          <button class="toolbar-btn btn-secondary" id="shareBtn" type="button"><i data-lucide="link" class="h-4 w-4"></i>Share Link</button>
          <button class="toolbar-btn btn-secondary" id="exportJsonBtn" type="button"><i data-lucide="file-down" class="h-4 w-4"></i>Export JSON</button>
          <button class="toolbar-btn btn-secondary" id="importJsonBtn" type="button"><i data-lucide="file-up" class="h-4 w-4"></i>Import JSON</button>
          <button class="toolbar-btn btn-dark" id="downloadPngBtn" type="button"><i data-lucide="download" class="h-4 w-4"></i>Download PNG</button>
          <button class="toolbar-btn btn-secondary" id="downloadJpgBtn" type="button"><i data-lucide="image" class="h-4 w-4"></i>Download JPG</button>
          <button class="toolbar-btn btn-secondary" id="sampleBtn" type="button"><i data-lucide="sparkles" class="h-4 w-4"></i>Sample</button>
          <button class="toolbar-btn btn-danger" id="resetBtn" type="button"><i data-lucide="trash-2" class="h-4 w-4"></i>Clear</button>
        </div>
        <input class="visually-hidden" id="jsonFileInput" type="file" accept="application/json,.json">
      </aside>

      <section class="panel p-3 sm:p-4" aria-label="Workflow preview">
        <div class="mb-3 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <h2 class="text-lg font-black text-[#17221f]">Preview</h2>
            <p class="text-sm font-bold text-[#607268]" id="saveStatus">Loading...</p>
          </div>
          <div class="flex flex-wrap items-center gap-2 rounded-full border border-[#d6e6dc] bg-[#f6fbf7] px-3 py-2 text-xs font-black uppercase text-[#0b6b45]" aria-label="Preview zoom controls">
            <i data-lucide="zoom-in" class="h-4 w-4"></i>
            <button class="zoom-btn active" type="button" data-zoom="fit" aria-pressed="true">Fit</button>
            <button class="zoom-btn" type="button" data-zoom="0.75" aria-pressed="false">75%</button>
            <button class="zoom-btn" type="button" data-zoom="1" aria-pressed="false">100%</button>
          </div>
        </div>
        <div class="preview-wrap">
          <div class="preview-stage">
            <article class="infographic" id="infographic" aria-label="Generated workflow infographic"></article>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script>
    const STORAGE_KEY = "threePcWorkflowBuilder.v3";
    const colors = ["#0b6b45", "#0f766e", "#155e75"];
    const icons = ["keyboard", "settings", "monitor-check"];
    let activePc = 0;
    let lastRenderedState = null;
    let previewZoom = "fit";
    let saveTimer = null;
    let lastClearedState = null;
    let statusTimer = null;

    const safeStorage = {
      get(key) {
        try { return window.localStorage ? window.localStorage.getItem(key) : null; } catch (error) { return null; }
      },
      set(key, value) {
        try { if (window.localStorage) window.localStorage.setItem(key, value); return true; } catch (error) { return false; }
      }
    };

    const sampleState = {
      title: "3-PC Daily Workflow Map",
      dateLabel: "Daily Run Documentation",
      owner: "Automation Team",
      objective: "PC 1 runs first, sends one completion email to all 3 PCs, then PC 1, PC 2, and PC 3 continue their own tasks in parallel.",
      errors: [
        {
          id: uid(),
          pcName: "PC 1",
          stepName: "Initial Run",
          description: "Task Scheduler did not trigger the startup macro.",
          frequency: "Occasionally",
          resolution: "Check Task Scheduler history, confirm the macro file path, and rerun the startup macro manually if needed.",
          status: "Unsolved"
        },
        {
          id: uid(),
          pcName: "PC 2",
          stepName: "Wait for Broadcast",
          description: "PC1_READY email arrived late or mailbox rule did not detect it.",
          frequency: "Rarely",
          resolution: "Restart the mailbox rule, confirm inbox sync, and resend the PC1_READY notification if needed.",
          status: "Solved"
        },
        {
          id: uid(),
          pcName: "PC 3",
          stepName: "Daily Finish Check",
          description: "One PC output was missing during final validation.",
          frequency: "Frequently",
          resolution: "Verify PC 1, PC 2, and PC 3 result files before marking the workflow finished.",
          status: "Unsolved"
        }
      ],
      pcs: [
        {
          name: "PC 1",
          steps: [
            step("Initial Run", "Run PC 1 startup macro", "Scheduler", "Daily at 07:00", "Windows Task Scheduler", "Prepares source data", "Send broadcast email", "07:00", "Running", "PC 1 is the only lane that starts before the shared trigger."),
            step("Broadcast Ready Email", "Send completion notification to PC 1, PC 2, and PC 3", "Previous Step", "PC 1 startup macro finished", "PC 1 completion status", "Email: PC1_READY", "Parallel tasks start on all PCs", "07:05", "Success", "This is the shared gate that releases every PC at the same time."),
            step("PC 1 Parallel Task", "Run PC 1 post-email macro", "Email", "Email subject contains PC1_READY", "Broadcast email from PC 1", "PC 1 task result", "Daily finish check", "07:06", "Running", "Starts together with PC 2 and PC 3 after the email arrives.")
          ]
        },
        {
          name: "PC 2",
          steps: [
            step("Wait for Broadcast", "Watch inbox for PC1_READY", "Email", "Email subject contains PC1_READY", "Broadcast email from PC 1", "PC 2 automation starts", "PC 2 parallel task", "07:05", "Waiting", "PC 2 does not wait for PC 3; it only waits for PC 1's email."),
            step("PC 2 Parallel Task", "Run PC 2 macro sequence", "Previous Step", "PC1_READY email detected", "PC 2 source files", "PC 2 task result", "Daily finish check", "07:06", "Running", "Runs at the same time as PC 1 and PC 3 post-email tasks.")
          ]
        },
        {
          name: "PC 3",
          steps: [
            step("Wait for Broadcast", "Watch inbox for PC1_READY", "Email", "Email subject contains PC1_READY", "Broadcast email from PC 1", "PC 3 automation starts", "PC 3 parallel task", "07:05", "Waiting", "PC 3 starts from the same shared trigger as PC 1 and PC 2."),
            step("PC 3 Parallel Task", "Run PC 3 validation and reporting", "Previous Step", "PC1_READY email detected", "PC 3 dashboard file", "PC 3 task result", "Daily finish check", "07:06", "Running", "Runs concurrently after the broadcast trigger."),
            step("Daily Finish Check", "Confirm all PC outputs are complete", "Condition", "PC 1, PC 2, and PC 3 results received", "All parallel task outputs", "Workflow marked finished", "End of flow", "07:45", "Finished", "Final confirmation happens after all parallel work is complete.")
          ]
        }
      ]
    };

    function step(name, action, triggerType, triggerDetail, input, output, next, time, status, notes) {
      return { id: uid(), name, action, triggerType, triggerDetail, input, output, next, time, status, notes };
    }

    function uid() {
      return Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function getBlankState() {
      return {
        title: "3-PC Daily Workflow Map",
        dateLabel: new Date().toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" }),
        owner: "",
        objective: "Sequential macros, triggers, outputs, and daily finish indicators.",
        pcs: [
          { name: "PC 1", steps: [blankStep()] },
          { name: "PC 2", steps: [blankStep()] },
          { name: "PC 3", steps: [blankStep()] }
        ],
        errors: []
      };
    }

    function blankStep() {
      return step("New Step", "", "Previous Step", "", "", "", "", "", "", "");
    }

    function blankError() {
      return {
        id: uid(),
        pcName: state?.pcs?.[activePc]?.name || `PC ${activePc + 1}`,
        stepName: "",
        description: "",
        frequency: "Occasionally",
        resolution: "",
        status: "Unsolved"
      };
    }

    async function loadState() {
      const urlState = await readStateFromUrl();
      if (urlState) {
        showToast("Loaded workflow from shared link");
        return normalizeState(urlState);
      }

      const stored = safeStorage.get(STORAGE_KEY);
      if (stored) {
        try {
          return normalizeState(JSON.parse(stored));
        } catch (error) {
          return clone(sampleState);
        }
      }
      return clone(sampleState);
    }

    let state = clone(sampleState);

    function normalizeState(input) {
      const base = getBlankState();
      const next = { ...base, ...input };
      next.pcs = [0, 1, 2].map((index) => {
        const source = input.pcs && input.pcs[index] ? input.pcs[index] : base.pcs[index];
        const steps = Array.isArray(source.steps) && source.steps.length ? source.steps : [blankStep()];
        return {
          name: source.name || base.pcs[index].name,
          steps: steps.map((item) => ({
            ...blankStep(),
            ...item,
            id: item.id || uid()
          }))
        };
      });
      next.errors = Array.isArray(input.errors) ? input.errors.map((item) => ({
        ...blankError(),
        ...item,
        id: item.id || uid(),
        frequency: ["Rarely", "Occasionally", "Frequently"].includes(item.frequency) ? item.frequency : "Occasionally",
        status: item.status === "Solved" ? "Solved" : "Unsolved"
      })) : [];
      return next;
    }

    function saveState() {
      const saved = safeStorage.set(STORAGE_KEY, JSON.stringify(state));
      const status = document.getElementById("saveStatus");
      if (status) status.textContent = saved
        ? `Saved ${new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}`
        : "Autosave unavailable";
    }

    function scheduleStateSync(options = {}) {
      const status = document.getElementById("saveStatus");
      if (status) status.textContent = "Unsaved changes...";
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        saveState();
        if (options.renderTabs) renderTabs();
        renderPreview(state);
      }, options.delay ?? 180);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function compactState(value) {
      const trimArray = (items) => {
        const trimmed = [...items];
        while (trimmed.length && (trimmed[trimmed.length - 1] === "" || trimmed[trimmed.length - 1] == null)) {
          trimmed.pop();
        }
        return trimmed;
      };

      return {
        v: 2,
        t: value.title || "",
        d: value.dateLabel || "",
        o: value.owner || "",
        j: value.objective || "",
        e: (value.errors || []).map((item) => trimArray([
          item.pcName || "",
          item.stepName || "",
          item.description || "",
          item.frequency || "",
          item.resolution || "",
          item.status || ""
        ])),
        p: value.pcs.map((pc) => [
          pc.name || "",
          pc.steps.map((item) => trimArray([
            item.name || "",
            item.action || "",
            item.triggerType || "",
            item.triggerDetail || "",
            item.input || "",
            item.output || "",
            item.next || "",
            item.time || "",
            item.status || "",
            item.notes || ""
          ]))
        ])
      };
    }

    function expandCompactState(value) {
      if (value && value.v === 2 && Array.isArray(value.p)) {
        return {
          title: value.t || "",
          dateLabel: value.d || "",
          owner: value.o || "",
          objective: value.j || "",
          errors: Array.isArray(value.e) ? value.e.map((item) => ({
            pcName: item[0] || "",
            stepName: item[1] || "",
            description: item[2] || "",
            frequency: item[3] || "Occasionally",
            resolution: item[4] || "",
            status: item[5] || "Unsolved"
          })) : [],
          pcs: value.p.map((pc, pcIndex) => ({
            name: pc[0] || `PC ${pcIndex + 1}`,
            steps: Array.isArray(pc[1]) ? pc[1].map((item) => ({
              name: item[0] || "",
              action: item[1] || "",
              triggerType: item[2] || "",
              triggerDetail: item[3] || "",
              input: item[4] || "",
              output: item[5] || "",
              next: item[6] || "",
              time: item[7] || "",
              status: item[8] || "",
              notes: item[9] || ""
            })) : [blankStep()]
          }))
        };
      }
      return {
        title: value.title || "",
        dateLabel: value.dateLabel || "",
        owner: value.owner || "",
        objective: value.objective || "",
        errors: Array.isArray(value.errors) ? value.errors.map(({ id, ...rest }) => rest) : [],
        pcs: (value.pcs || []).map((pc) => ({
          name: pc.name || "",
          steps: (pc.steps || []).map(({ id, ...rest }) => rest)
        }))
      };
    }

    async function encodeState(value) {
      const json = JSON.stringify(compactState(value));
      if (window.CompressionStream) {
        return compressText(json);
      }
      return encodePlainText(json);
    }

    function encodePlainText(json) {
      const bytes = new TextEncoder().encode(json);
      let binary = "";
      bytes.forEach((byte) => binary += String.fromCharCode(byte));
      return `p.${btoa(binary).replaceAll("+", "-").replaceAll("/", "_").replaceAll("=", "")}`;
    }

    async function compressText(text) {
      try {
        const rawStream = new Blob([text]).stream().pipeThrough(new CompressionStream("deflate-raw"));
        const rawCompressed = new Uint8Array(await new Response(rawStream).arrayBuffer());
        return `r.${bytesToBase64Url(rawCompressed)}`;
      } catch (error) {
        const stream = new Blob([text]).stream().pipeThrough(new CompressionStream("gzip"));
        const compressed = new Uint8Array(await new Response(stream).arrayBuffer());
        return `z.${bytesToBase64Url(compressed)}`;
      }
    }

    function bytesToBase64Url(bytes) {
      let binary = "";
      const chunkSize = 0x8000;
      for (let index = 0; index < bytes.length; index += chunkSize) {
        binary += String.fromCharCode(...bytes.subarray(index, index + chunkSize));
      }
      return btoa(binary).replaceAll("+", "-").replaceAll("/", "_").replaceAll("=", "");
    }

    function base64UrlToBytes(encoded) {
      const padded = encoded.replaceAll("-", "+").replaceAll("_", "/") + "===".slice((encoded.length + 3) % 4);
      const binary = atob(padded);
      return Uint8Array.from(binary, (char) => char.charCodeAt(0));
    }

    async function decodeState(encoded) {
      if (encoded.startsWith("r.")) {
        const bytes = base64UrlToBytes(encoded.slice(2));
        const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
        const json = await new Response(stream).text();
        return expandCompactState(JSON.parse(json));
      }
      if (encoded.startsWith("z.")) {
        const bytes = base64UrlToBytes(encoded.slice(2));
        const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
        const json = await new Response(stream).text();
        return expandCompactState(JSON.parse(json));
      }
      const plain = encoded.startsWith("p.") ? encoded.slice(2) : encoded;
      const bytes = base64UrlToBytes(plain);
      return expandCompactState(JSON.parse(new TextDecoder().decode(bytes)));
    }

    async function readStateFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const rawData = params.get("s");
      const compressedData = params.get("z");
      const data = rawData ? `r.${rawData}` : (compressedData ? `z.${compressedData}` : (params.get("w") || params.get("data")));
      if (!data) return null;
      try {
        return await decodeState(data);
      } catch (error) {
        showToast("The shared link data could not be read");
        return null;
      }
    }

    async function createShareUrl() {
      const url = new URL(window.location.href);
      url.search = "";
      url.hash = "";
      const encoded = await encodeState(state);
      const key = encoded.startsWith("r.") ? "s" : (encoded.startsWith("z.") ? "z" : "w");
      url.searchParams.set(key, encoded.slice(2));
      return url.toString();
    }

    function renderAll() {
      renderDocFields();

    function renderDocFields() {
      document.querySelectorAll("[data-doc-field]").forEach((field) => {

      });
    }

    function renderTabs() {
      const tabs = document.getElementById("pcTabs");
      tabs.setAttribute("role", "tablist");
      tabs.setAttribute("aria-label", "PC lanes");
      tabs.innerHTML = state.pcs.map((pc, index) => `
        <button class="tab ${index === activePc ? "active" : ""}" type="button" data-tab="${index}" role="tab" id="pc-tab-${index}" aria-selected="${index === activePc}" aria-controls="pcForm" tabindex="${index === activePc ? 0 : -1}">
          ${escapeHtml(pc.name || `PC ${index + 1}`)}
        </button>
      `).join("");
      tabs.querySelectorAll("[data-tab]").forEach((button) => {
        button.addEventListener("click", () => {
          activePc = Number(button.dataset.tab);
          renderAll();
        });
        button.addEventListener("keydown", (event) => {
          const keys = ["ArrowLeft", "ArrowRight", "Home", "End"];
          if (!keys.includes(event.key)) return;
          event.preventDefault();
          if (event.key === "Home") activePc = 0;
          else if (event.key === "End") activePc = state.pcs.length - 1;
          else activePc = (activePc + (event.key === "ArrowRight" ? 1 : -1) + state.pcs.length) % state.pcs.length;
          renderAll();
          document.querySelector(`[data-tab="${activePc}"]`)?.focus();
        });
      });
    }

    function renderPcForm() {
      const pc = state.pcs[activePc];
      const holder = document.getElementById("pcForm");
      holder.setAttribute("role", "tabpanel");
      holder.setAttribute("tabindex", "0");
      holder.setAttribute("aria-labelledby", `pc-tab-${activePc}`);
      const pcNameId = `pc-${activePc}-name`;
      holder.innerHTML = `

      `;

      holder.querySelectorAll("[data-pc-field]").forEach((field) => {
        field.addEventListener("input", () => {
          pc[field.dataset.pcField] = field.value;
          scheduleStateSync({ renderTabs: true });
        });
      });

      holder.querySelectorAll("[data-step-field]").forEach((field) => {
        field.addEventListener("input", () => {
          const stepIndex = Number(field.dataset.stepIndex);
          const key = field.dataset.stepField;
          pc.steps[stepIndex][key] = field.value;
          scheduleStateSync();
        });
      });

      holder.querySelectorAll("[data-remove-step]").forEach((button) => {
        button.addEventListener("click", () => {
          const stepIndex = Number(button.dataset.removeStep);
          if (pc.steps.length === 1) {
            pc.steps[0] = blankStep();
          } else {
            pc.steps.splice(stepIndex, 1);
          }
          saveState();
          renderAll();
        });
      });

      holder.querySelectorAll("[data-duplicate-step]").forEach((button) => {
        button.addEventListener("click", () => {
          const stepIndex = Number(button.dataset.duplicateStep);
          pc.steps.splice(stepIndex + 1, 0, { ...clone(pc.steps[stepIndex]), id: uid(), name: `${pc.steps[stepIndex].name || "Step"} Copy` });
          saveState();
          renderAll();
          showToast("Step duplicated");
        });
      });

      holder.querySelectorAll("[data-move-step]").forEach((button) => {
        button.addEventListener("click", () => {
          const stepIndex = Number(button.dataset.moveStep);
          const direction = Number(button.dataset.direction);
          const targetIndex = stepIndex + direction;
          if (targetIndex < 0 || targetIndex >= pc.steps.length) return;
          const [item] = pc.steps.splice(stepIndex, 1);
          pc.steps.splice(targetIndex, 0, item);
          saveState();
          renderAll();
          showToast("Step moved");
        });
      });

      document.getElementById("addStepBtn").addEventListener("click", () => {
        pc.steps.push(blankStep());
        saveState();
        renderAll();
      });

      holder.querySelectorAll("[data-error-field]").forEach((field) => {
        field.addEventListener("input", () => {
          const errorIndex = Number(field.dataset.errorIndex);
          const key = field.dataset.errorField;
          state.errors[errorIndex][key] = field.value;
          scheduleStateSync();
        });
        field.addEventListener("change", () => {
          const errorIndex = Number(field.dataset.errorIndex);
          const key = field.dataset.errorField;
          state.errors[errorIndex][key] = field.value;
          scheduleStateSync();
        });
      });

      holder.querySelectorAll("[data-remove-error]").forEach((button) => {
        button.addEventListener("click", () => {
          const errorIndex = Number(button.dataset.removeError);
          state.errors.splice(errorIndex, 1);
          saveState();
          renderAll();
          showToast("Error removed");
        });
      });

      document.getElementById("addErrorBtn").addEventListener("click", () => {
        state.errors.push(blankError());
        saveState();
        renderAll();
        showToast("Error added");
      });
    }

    function syncPreviewStageHeight() {
      const stage = document.querySelector(".preview-stage");
      const node = document.getElementById("infographic");
      const wrap = document.querySelector(".preview-wrap");
      if (!stage || !node) return;
      const selectedScale = previewZoom === "fit"
        ? Math.min(1, Math.max(0.2, ((wrap?.clientWidth || 1110) - 28) / node.offsetWidth))
        : Number(previewZoom);
      stage.style.setProperty("--preview-scale", selectedScale);
      stage.style.width = `${node.offsetWidth * selectedScale}px`;
      stage.style.height = `${node.offsetHeight * selectedScale}px`;
      updateZoomButtons();
    }

    function updateZoomButtons() {
      document.querySelectorAll("[data-zoom]").forEach((button) => {
        button.classList.toggle("active", button.dataset.zoom === String(previewZoom));
        button.setAttribute("aria-pressed", button.dataset.zoom === String(previewZoom));
      });
    }

            return `
              <article class="error-card ${solved ? "solved" : ""}">
                <div class="error-card-head">
                  <div>
                    <div class="error-pc">${escapeHtml(item.pcName || "PC")}</div>
                    <div class="error-step">${escapeHtml(item.stepName || "Unassigned Step")}</div>
                  </div>
                  <div class="error-status">${escapeHtml(item.status || "Unsolved")}</div>
                </div>
                <div class="error-meta">
                  <i data-lucide="activity" class="h-3.5 w-3.5"></i>
                  ${escapeHtml(item.frequency || "Occasionally")}
                </div>
                <div class="error-text"><strong>Error:</strong> ${escapeHtml(item.description || "No description added.")}</div>
                <div class="error-text mt-1"><strong>Solution:</strong> ${escapeHtml(item.resolution || "No resolution added yet.")}</div>
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function handoffTableHtml(value) {
      const rows = [];
      value.pcs.forEach((pc) => {
        pc.steps.forEach((item, index) => {
          if (item.output || item.next || item.triggerDetail) {
            const isBroadcast = /all\s*3\s*pc|pc 1,\s*pc 2,\s*and\s*pc 3|parallel/i.test(`${item.action} ${item.output} ${item.next} ${item.notes}`);
            rows.push({
              pc: pc.name,
              step: item.name || `Step ${index + 1}`,
              trigger: item.triggerDetail || item.triggerType,
              output: item.output,
              next: item.next,
              receivers: isBroadcast ? "PC 1, PC 2, PC 3" : pc.name,
              mode: isBroadcast ? "Broadcast trigger" : (item.triggerType === "Email" ? "Email listener" : "Local step")
            });
          }
        });
      });

      if (!rows.length) {
        return `<div class="empty-state m-4">No handoffs added yet.</div>`;
      }

      return `
        <div class="trigger-summary">
          <div class="trigger-summary-item">
            <div class="trigger-summary-label">Purpose</div>
            <div class="trigger-summary-value">Show the email signal that unlocks parallel work.</div>
          </div>
          <div class="trigger-summary-item">
            <div class="trigger-summary-label">Expected Logic</div>
            <div class="trigger-summary-value">PC 1 runs first, then all PCs continue together.</div>
          </div>
        </div>
        <table class="handoff-table">
          <thead>
            <tr>
              <th style="width: 16%">Source</th>
              <th style="width: 22%">Trigger Event</th>
              <th style="width: 22%">Signal / Output</th>
              <th style="width: 20%">Receivers</th>
              <th style="width: 20%">Start Result</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((row) => `
              <tr>
                <td>${escapeHtml(row.pc)}</td>
                <td>${escapeHtml(row.trigger || row.step)}</td>
                <td>${escapeHtml(row.output || row.step)}</td>
                <td>${escapeHtml(row.receivers)}</td>
                <td>${escapeHtml(row.next || row.mode)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function controlPointHtml(title, icon, text) {
      return `
        <div class="metric">
          <i data-lucide="${icon}" class="metric-icon h-7 w-7"></i>
          <div class="metric-title">${escapeHtml(title)}</div>
          <div class="metric-text">${escapeHtml(text)}</div>
        </div>
      `;
    }

    async function downloadImage(type) {
      const previewNode = document.getElementById("infographic");
      if (!window.html2canvas) {
        showToast("Download library is still loading. Try again in a moment.");
        return;
      }
      const downloadButtons = [document.getElementById("downloadPngBtn"), document.getElementById("downloadJpgBtn")].filter(Boolean);
      let host = null;
      let node = null;
      try {
        downloadButtons.forEach((button) => button.disabled = true);
        renderPreview(lastRenderedState || state);
        showToast("Preparing image...");

        host = document.createElement("div");
        host.className = "export-host";
        node = previewNode.cloneNode(true);
        node.id = "infographic-export";
        node.classList.add("is-exporting");
        host.appendChild(node);
        document.body.appendChild(host);

        if (window.lucide) {
          lucide.createIcons({
            attrs: { "stroke-width": 2.4 },
            nameAttr: "data-lucide"
          });
        }

        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }
        await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));

        const exportWidth = Math.ceil(node.getBoundingClientRect().width);
        const exportHeight = Math.ceil(node.getBoundingClientRect().height);
        if (exportHeight > 9000 && !confirm("This workflow is very tall and may take a moment to export. Continue?")) {
          showToast("Download cancelled");
          return;
        }
        const canvas = await html2canvas(node, {
          backgroundColor: "#ffffff",
          scale: 2,
          useCORS: true,
          allowTaint: true,
          logging: false,
          width: exportWidth,
          height: exportHeight,
          windowWidth: exportWidth,
          windowHeight: exportHeight,
          scrollX: 0,
          scrollY: 0
        });
        const mime = type === "jpg" ? "image/jpeg" : "image/png";
        const extension = type === "jpg" ? "jpg" : "png";
        const link = document.createElement("a");
        link.download = `${slugify(state.title || "3pc-workflow")}.${extension}`;
        link.href = canvas.toDataURL(mime, type === "jpg" ? 0.96 : 1);
        document.body.appendChild(link);
        link.click();
        link.remove();
        showToast(`Downloaded ${extension.toUpperCase()}`);
      } catch (error) {
        console.error(error);
        showToast("Download failed. Please refresh and try again.");
        alert("Download failed. Please refresh the page and try again. If it still fails, make sure the page is opened from GitHub Pages, not from the GitHub file preview.");
      } finally {
        if (host) host.remove();
        downloadButtons.forEach((button) => button.disabled = false);
      }
    }

    function downloadJson() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const link = document.createElement("a");
      link.download = `${slugify(state.title || "3pc-workflow")}.json`;
      link.href = URL.createObjectURL(blob);
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(link.href);
      showToast("JSON backup downloaded");
    }

    async function importJsonFile(file) {
      if (!file) return;
      if (!file.name.toLowerCase().endsWith(".json")) {
        showToast("Choose a JSON workflow backup");
        return;
      }
      try {
        const json = JSON.parse(await file.text());
        const imported = expandCompactState(json);
        if (!imported || !Array.isArray(imported.pcs)) throw new Error("Missing workflow lanes");
        state = normalizeState(imported);
        activePc = 0;
        saveState();
        renderAll();
        showToast("JSON workflow imported");
      } catch (error) {
        console.error(error);
        showToast("JSON import failed");
        alert("JSON import failed. Please choose a valid workflow backup file.");
      }
    }

    function slugify(value) {
      return String(value).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "workflow";
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      if (!toast) return;
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 2400);
    }

    function refreshIcons() {
      if (window.lucide) {
        lucide.createIcons();
      }
    }

    document.addEventListener("input", (event) => {
      const field = event.target.closest("[data-doc-field]");
      if (!field) return;
      state[field.dataset.docField] = field.value;
      scheduleStateSync();
    });

    document.getElementById("previewBtn").addEventListener("click", () => {
      saveState();
      renderPreview(state);
      showToast("Preview updated");
    });

    document.getElementById("shareBtn").addEventListener("click", async () => {
      saveState();
      const shareButton = document.getElementById("shareBtn");
      shareButton?.setAttribute("aria-busy", "true");
      showToast("Creating compressed link...");
      try {
        const shareUrl = await createShareUrl();
        window.history.replaceState(null, "", shareUrl);
        try {
          await navigator.clipboard.writeText(shareUrl);
          showToast(`Shorter link copied (${shareUrl.length} characters)`);
        } catch (error) {
          showToast("Share link added to the address bar");
        }
      } catch (error) {
        console.error(error);
        showToast("Short link could not be created in this browser");
      } finally {
        shareButton?.removeAttribute("aria-busy");
      }
    });

    document.getElementById("downloadPngBtn").addEventListener("click", () => downloadImage("png"));
    document.getElementById("downloadJpgBtn").addEventListener("click", () => downloadImage("jpg"));
    document.getElementById("exportJsonBtn").addEventListener("click", downloadJson);
    document.getElementById("importJsonBtn").addEventListener("click", () => document.getElementById("jsonFileInput").click());
    document.getElementById("jsonFileInput").addEventListener("change", (event) => {
      importJsonFile(event.target.files[0]);
      event.target.value = "";
    });

    document.querySelectorAll("[data-zoom]").forEach((button) => {
      button.addEventListener("click", () => {
        previewZoom = button.dataset.zoom;
        syncPreviewStageHeight();
      });
    });

    document.getElementById("sampleBtn").addEventListener("click", () => {
      state = clone(sampleState);
      activePc = 0;
      saveState();
      renderAll();
      showToast("Sample loaded");
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      if (!confirm("Clear the current workflow and start fresh?")) return;
      lastClearedState = clone(state);
      state = getBlankState();
      activePc = 0;
      saveState();
      renderAll();
      showToast("Workflow cleared. Press Ctrl+Z to undo.");
    });

    document.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z" && lastClearedState) {
        event.preventDefault();
        state = clone(lastClearedState);
        lastClearedState = null;
        saveState();
        renderAll();
        showToast("Clear undone");
      }
    });

    window.addEventListener("resize", () => syncPreviewStageHeight());

    async function initApp() {
      state = await loadState();
      renderAll();
      saveState();
      document.documentElement.classList.add("app-ready");
    }

    initApp();
  </script>
</body>
</html>
